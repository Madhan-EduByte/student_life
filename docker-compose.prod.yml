version: "3.9"

services:
  # ─── MySQL Database ────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: destinai-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed_careers.sql:/docker-entrypoint-initdb.d/02-seed-careers.sql
      - ./database/seed_colleges.sql:/docker-entrypoint-initdb.d/03-seed-colleges.sql
    networks:
      - destinai-network-prod
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # ─── Redis Cache ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: destinai-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    networks:
      - destinai-network-prod
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── FastAPI Backend ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - APP_ENV=production
    container_name: destinai-backend-prod
    restart: always
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - destinai-network-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ─── React Frontend (built static files) ──────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: destinai-frontend-prod
    restart: always
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - destinai-network-prod
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── Nginx Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: destinai-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl
      - certbot_data:/var/www/certbot
    depends_on:
      - backend
      - frontend
    networks:
      - destinai-network-prod

  # ─── Certbot (SSL) ────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: destinai-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mysql_data_prod:
  redis_data_prod:
  certbot_data:

networks:
  destinai-network-prod:
    driver: bridge
